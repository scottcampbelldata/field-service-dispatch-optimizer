# nginx reverse proxy for the dispatch optimizer.
# TLS termination via certbot (paths shown as managed by certbot).

# Frontend: https://dispatch.scottcampbell.io
server {
    server_name dispatch.scottcampbell.io;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/dispatch.scottcampbell.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dispatch.scottcampbell.io/privkey.pem;
}

# API: https://dispatch-api.scottcampbell.io
server {
    server_name dispatch-api.scottcampbell.io;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/dispatch-api.scottcampbell.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dispatch-api.scottcampbell.io/privkey.pem;
}

# Redirect http -> https
server {
    listen 80;
    server_name dispatch.scottcampbell.io dispatch-api.scottcampbell.io;
    return 301 https://$host$request_uri;
}
